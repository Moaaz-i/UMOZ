version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "09:00"
      timezone: "Asia/Riyadh"

    reviewers:
      - "moaaz-i"

    labels:
      - "bot-update"
      - "needs-review"

    open-pull-requests-limit: 3
