name: Arduino Library CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # إرسال تعليق للمستخدم في الـ PR
      - name: Send greeting comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "Hello Moaaz! 👋\nYour Arduino CI workflow is now running."
            })

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install board platforms
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Compile examples
        run: |
          for example in $(find ./examples -name "*.ino"); do
            echo "Compiling $example"
            arduino-cli compile --fqbn arduino:avr:uno "$example" --library .
          done
