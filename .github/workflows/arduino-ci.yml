name: Arduino Library CI & Automations

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    name: Build on ${{ matrix.fqbn }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - core: "arduino:avr"
            fqbn: "arduino:avr:uno"

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Check and Extract Version
        id: version_check
        run: |
          if [ -f "library.properties" ]; then
            PROP_VERSION=$(grep -i '^version=' library.properties | cut -d= -f2 | xargs)
          fi

          if [ -f "library.json" ]; then
            JSON_VERSION=$(jq -r '.version // empty' library.json 2>/dev/null || grep -o '"version": *"[^"]*"' library.json | cut -d'"' -f4)
          fi

          if [ ! -z "$PROP_VERSION" ] && [ ! -z "$JSON_VERSION" ]; then
            if [ "$PROP_VERSION" != "$JSON_VERSION" ]; then
              echo "Error: Version mismatch between library.properties ($PROP_VERSION) and library.json ($JSON_VERSION)"
              exit 1
            fi
          fi

          FINAL_VERSION="${PROP_VERSION:-$JSON_VERSION}"
          if [ -z "$FINAL_VERSION" ]; then
            echo "Error: Could not find version in library.properties or library.json"
            exit 1
          fi

          echo "version=$FINAL_VERSION" >> $GITHUB_OUTPUT

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Cache Arduino Core
        uses: actions/cache@v6
        with:
          path: |
            ~/.arduino15/packages
            ~/.arduino15/staging
          key: ${{ runner.os }}-arduino-${{ matrix.core }}

      - name: Install board platforms
        run: |
          arduino-cli core update-index
          arduino-cli core install ${{ matrix.core }}

      - name: Compile examples
        run: |
          mkdir -p error_logs
          FAILED=0
          SAFE_BOARD_NAME=$(echo "${{ matrix.fqbn }}" | tr ':' '_')

          find ./examples -name "*.ino" -print0 | while IFS= read -r -d '' example; do
            if ! arduino-cli compile --fqbn ${{ matrix.fqbn }} "$example" --library . > compile_output.txt 2>&1; then
              FAILED=1
              EXAMPLE_NAME=$(basename "$example")
              echo "### ❌ Compilation Failed for $EXAMPLE_NAME on ${{ matrix.fqbn }}" >> error_logs/${SAFE_BOARD_NAME}_errors.md
              cat compile_output.txt >> error_logs/${SAFE_BOARD_NAME}_errors.md
            fi
          done

          if [ $FAILED -ne 0 ]; then exit 1; fi

      - name: Request Changes on Failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const boardName = "${{ matrix.fqbn }}".replace(/:/g, '_');
            const path = `error_logs/${boardName}_errors.md`;
            let errors = "Unknown compilation error.";
            if (fs.existsSync(path)) { errors = fs.readFileSync(path, 'utf8'); }

            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'REQUEST_CHANGES',
              body: `### ⚠️ CI Automated Review: Changes Requested\n\nHello @${context.actor}, the compilation failed. Please fix the following errors:\n\n${errors}`
            });

      - name: Approve and Enable Auto-Merge on Success
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: `### ✅ CI Automated Review: Approved!\n\nGreat job @${context.actor}! The code compiles perfectly on **${{ matrix.fqbn }}**. Activating safe auto-merge...`
            });

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                merge_method: 'squash'
              });
              console.log("Auto-merge triggered successfully.");
            } catch (error) {
              console.log("Auto-merge skipped or handled by system constraints:", error.message);
            }

      - name: Create Release and Tag
        if: success() && github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const version = "${{ steps.version_check.outputs.version }}";
            const tagName = `v${version}`;

            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tagName
              });
              console.log(`Release for ${tagName} already exists. Skipping creation.`);
            } catch (error) {
              if (error.status === 404) {
                await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: tagName,
                  name: `Release ${tagName}`,
                  body: `Automated release for version ${version}`,
                  draft: false,
                  prerelease: false
                });
                console.log(`Successfully created release ${tagName}`);
              } else {
                throw error;
              }
            }

  close-abandoned-prs:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Close Stale Pull Requests
        uses: actions/github-script@v9
        with:
          script: |
            const daysToStale = 7;
            const now = new Date();

            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });

            for (const pr of prs.data) {
              const updatedAt = new Date(pr.updated_at);
              const diffTime = Math.abs(now - updatedAt);
              const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

              if (diffDays >= daysToStale) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: `⚠️ This Pull Request has been automatically closed because there has been no activity or review from the author or maintainers for the last ${daysToStale} days. Feel free to reopen it once you are ready to update the code! 🔒`
                });

                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  state: 'closed'
                });
              }
            }
