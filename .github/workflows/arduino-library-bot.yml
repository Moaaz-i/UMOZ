name: Arduino Library Autonomous Bot
run-name: 🤖 Autonomous Bot - ${{ github.event_name }} by @${{ github.actor }}

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  quality:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Welcome New Contributor
        if: github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🤖 Welcome @${context.actor}! Running formatting and checks now...`
            });

      - name: Run Code Formatter
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format
          find . -iname '*.h' -o -iname '*.cpp' -o -iname '*.ino' | xargs -r clang-format -i

      - name: Commit & Push Formatted Code (if changed)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: automated code formatting by bot"
          commit_user_name: "autonomous-dev-bot[bot]"
          commit_user_email: "autonomous-bot@users.noreply.github.com"
          # منع تشغيل workflow مرة أخرى
          skip_dirty_check: false
          create_branch: false

      - name: Wait for formatting push (if any)
        if: steps.auto-commit.outputs.changes_detected == 'true'
        run: sleep 10

  # Build Job
  build:
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: "arduino:avr:uno"
            core: "arduino:avr"
            name: "avr-uno"
          - board: "arduino:avr:mega"
            core: "arduino:avr"
            name: "avr-mega"
          - board: "esp32:esp32:esp32"
            core: "esp32:esp32"
            name: "esp32"
            platform_url: "https://espressif.github.io/arduino-esp32/package_esp32_index.json"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Cache & Setup Platforms
        uses: actions/cache@v4
        with:
          path: ~/.arduino15
          key: arduino-${{ matrix.core }}

      - name: Setup Platforms
        run: |
          if [ -n "${{ matrix.platform_url }}" ]; then
            arduino-cli config init --overwrite
            arduino-cli config set board_manager.additional_urls ${{ matrix.platform_url }}
          fi
          arduino-cli core update-index
          arduino-cli core install ${{ matrix.core }}

      - name: Arduino Lint
        run: arduino-cli library install "arduino-lint" && arduino-lint --compliance strict --project . || true

      - name: Compile All Examples
        id: compile
        run: |
          mkdir -p reports
          SUCCESS=0
          FAILED=0

          echo "# 🔨 Build Report - ${{ matrix.board }}" > reports/build.md
          echo "**Date:** $(date)" >> reports/build.md
          echo "" >> reports/build.md
          echo "| Status | Example |" >> reports/build.md
          echo "|--------|---------|" >> reports/build.md

          while IFS= read -r -d '' example; do
            name=$(basename "$example")
            echo "::group::Building $name"
            if arduino-cli compile --fqbn ${{ matrix.board }} "$example" --library . > compile.log 2>&1; then
              SUCCESS=$((SUCCESS+1))
              echo "| ✅ | $name |" >> reports/build.md
            else
              FAILED=$((FAILED+1))
              echo "| ❌ | $name |" >> reports/build.md
              echo "::error title=Failed::$name failed to compile"
              echo '```' >> reports/build.md
              cat compile.log >> reports/build.md
              echo '```' >> reports/build.md
            fi
            echo "::endgroup::"
          done < <(find ./examples -name "*.ino" -print0)

          echo "" >> reports/build.md
          echo "**Summary:** ✅ $SUCCESS succeeded | ❌ $FAILED failed" >> reports/build.md

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-report-${{ matrix.name }}
          path: reports/

  report:
    needs: [build]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Download Reports
        uses: actions/download-artifact@v4
        with:
          pattern: build-report-*
          path: all-reports
        continue-on-error: true

      - name: Create Final Report
        run: |
          echo "# 🚀 Autonomous Bot - Final Report" > summary.md
          echo "**Status:** ${{ needs.build.result == 'success' && '✅ SUCCESS' || '❌ FAILED' }}" >> summary.md
          echo "**Date:** $(date)" >> summary.md
          echo "" >> summary.md
          cat all-reports/**/build.md >> summary.md 2>/dev/null || echo "No reports available." >> summary.md

      - name: Post Report to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('summary.md')) {
              const report = fs.readFileSync('summary.md', 'utf8');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report
              });
            }
