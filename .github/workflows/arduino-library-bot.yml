name: Arduino Library Autonomous Bot
run-name: Deploy to ${{ inputs.deploy_target }} by @${{ github.actor }}

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  issue_comment:
    types: [created]

jobs:
  # 1. وظيفة الفحص والتنسيق وتحديث الكود (تُنقذ أولاً لمنع تعارض الـ Matrix)
  lint-and-format:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Welcome New Contributor
        if: github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🤖 Welcome @${context.actor}! I am your autonomous assistant bot. I am now scanning your code, formatting it, and running test compilations. Please hold on.`
            });

      - name: Run Code Formatter (Clang Format)
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format
          find . -iname '*.h' -o -iname '*.cpp' -o -iname '*.ino' | xargs -r clang-format -i

      - name: Commit and Push Formatted Code
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: automated code formatting fixes by bot"
          commit_user_name: "autonomous-dev-bot[bot]"
          commit_user_email: "autonomous-bot@users.noreply.github.com"

  # 2. وظيفة البناء والفحص الأمني والبرمجي المتطور
  core-bot:
    # تم إصلاح الشرط هنا ودمجه في سطر واحد لمنع مشاكل الـ YAML
    if: |
      github.event_name != 'issue_comment' &&
      (always() && (needs.lint-and-format.result == 'success' || needs.lint-and-format.result == 'skipped'))
    needs: [lint-and-format]
    name: Autonomous Bot Operations
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - core: "arduino:avr"
            fqbn: "arduino:avr:uno"
          - core: "esp32:esp32"
            fqbn: "esp32:esp32:esp32"
            platform_url: "https://espressif.github.io/arduino-esp32/package_esp32_index.json"

    permissions:
      contents: write
      pull-requests: write
      issues: write
      security-events: write
      statuses: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0

      - name: Scan for Secret Leaks
        uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.pull_request.base.sha || '' }}
          head: ${{ github.event.pull_request.head.sha || '' }}
          extra_args: --only-verified

      - name: Check and Extract Version
        id: version_check
        run: |
          PROP_VERSION=$(grep -i '^version=' library.properties | cut -d= -f2 | xargs 2>/dev/null || echo "")
          JSON_VERSION=""
          if [ -f "library.json" ]; then
            JSON_VERSION=$(jq -r '.version // empty' library.json 2>/dev/null || echo "")
          fi
          if [ ! -z "$PROP_VERSION" ] && [ ! -z "$JSON_VERSION" ] && [ "$PROP_VERSION" != "$JSON_VERSION" ]; then
            echo "Error: Version mismatch between library.properties and library.json"
            exit 1
          fi
          echo "version=${PROP_VERSION:-$JSON_VERSION}" >> $GITHUB_OUTPUT

      - name: Verify Folder Structure
        run: |
          if [ ! -d "src" ] || [ ! -d "examples" ]; then
            echo "Standard Arduino library structure (src/ and examples/) is required."
            exit 1
          fi

      - name: Run cppcheck (Static Analysis)
        run: |
          sudo apt-get update && sudo apt-get install -y cppcheck
          cppcheck --enable=all --suppress=missingInclude --suppress=unusedFunction src/ --inline-suppr

      - name: Lint JSON & YAML configuration files
        run: |
          if [ -f "library.json" ]; then jq . library.json; fi

      - name: Check for broken markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Cache Arduino Core
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15/packages
            ~/.arduino15/staging
          key: ${{ runner.os }}-arduino-${{ matrix.core }}

      - name: Install board platforms
        run: |
          if [ ! -z "${{ matrix.platform_url }}" ]; then
            arduino-cli config init --overwrite
            arduino-cli config set board_manager.additional_urls ${{ matrix.platform_url }}
          fi
          arduino-cli core update-index
          arduino-cli core install ${{ matrix.core }}

      - name: Compile examples & Profile Memory
        run: |
          mkdir -p error_logs
          FAILED=0
          find ./examples -name "*.ino" -print0 | while IFS= read -r -d '' example; do
            echo "Building $example..."
            if ! arduino-cli compile --fqbn ${{ matrix.fqbn }} "$example" --library . > compile_output.txt 2>&1; then
              FAILED=1
              echo "### ❌ Compilation Failed for $(basename "$example")" >> error_logs/errors.md
              cat compile_output.txt >> error_logs/errors.md
            else
              echo "### 📊 Memory Profiling for $(basename "$example") [${{ matrix.core }}]:" >> error_logs/memory_report.md
              grep -E "Sketch uses|Global variables" compile_output.txt >> error_logs/memory_report.md || true
            fi
          done
          if [ $FAILED -ne 0 ]; then exit 1; fi

      - name: Request Changes on Failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let errors = fs.existsSync('error_logs/errors.md') ? fs.readFileSync('error_logs/errors.md', 'utf8') : "Compilation failed for unknown reasons.";
            github.rest.pulls.createReview({
              owner: context.repo.owner, repo: context.repo.repo, pull_number: context.issue.number,
              event: 'REQUEST_CHANGES',
              body: `⚠️ **Autonomous Bot Update:** Issues detected during automated checks:\n\n${errors}`
            });

      - name: Post Memory Usage Report
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('error_logs/memory_report.md')) {
              const report = fs.readFileSync('error_logs/memory_report.md', 'utf8');
              github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
                body: `🤖 **Autonomous Bot Memory Report:**\n\nCode compilation and hardware resource tracking completed successfully:\n${report}`
              });
            }

      - name: Auto-Label Pull Request based on changes
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner, repo: context.repo.repo, pull_number: context.issue.number
            });
            const labels = new Set();
            files.forEach(f => {
              if (f.filename.startsWith('examples/')) labels.add('examples');
              if (f.filename.startsWith('src/')) labels.add('source-code');
              if (f.filename.endsWith('.md')) labels.add('documentation');
            });
            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
                labels: Array.from(labels)
              });
            }

      - name: Check Todo Comments
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner, repo: context.repo.repo, pull_number: context.issue.number
            });
            let todoCount = 0;
            for (const file of files) {
              if (file.patch && file.patch.includes('+') && file.patch.toLowerCase().includes('todo')) {
                todoCount++;
              }
            }
            if (todoCount > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
                body: `📝 **Note:** Found ${todoCount} new 'TODO' comment(s) added in this PR.`
              });
            }

      - name: Enforce Size Constraints
        run: |
          MAX_SIZE_KB=500
          TOTAL_SIZE=$(du -sk src/ | cut -f1)
          if [ "$TOTAL_SIZE" -gt "$MAX_SIZE_KB" ]; then
            echo "Library size ($TOTAL_SIZE KB) exceeds the maximum allowed budget of $MAX_SIZE_KB KB."
            exit 1
          fi

      - name: Auto-Approve Dependabot
        if: success() && github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner, repo: context.repo.repo, pull_number: context.issue.number,
              event: 'APPROVE', body: `✅ Automated approval for Dependabot update.`
            });
            await github.rest.pulls.merge({
              owner: context.repo.owner, repo: context.repo.repo, pull_number: context.issue.number, merge_method: 'squash'
            });

      - name: Create Release and Auto Changelog
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        env:
          BOT_VERSION: ${{ steps.version_check.outputs.version }}
        with:
          script: |
            const version = process.env.BOT_VERSION;
            if (!version) return;
            const tagName = `v${version}`;
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner, repo: context.repo.repo, tag_name: tagName,
                name: `Autonomous Release ${tagName}`,
                body: `🤖 This version was automatically generated and released by the autonomous bot for version ${version}.`,
                generate_release_notes: true
              });
            } catch(e) { console.log("Release might already exist or failed: ", e.message); }

  # 3. وظيفة الأوامر عبر التعليقات
  bot-commands:
    if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '/bot')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Execute Bot Chat Command
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment.body;
            if (comment.includes('/bot-help')) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
                body: `🤖 Hello! Here are the available commands you can use to interact with me:\n- \`/bot-rebuild\` to re-trigger compilation tests.\n- \`/bot-lock\` to lock current issue discussions.`
              });
            }

  # 4. وظيفة الصيانة الدورية اليومية
  maintenance:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prune Stale Branches
        uses: jigsaw-labs/delete-merged-branches-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close Stale Pull Requests
        uses: actions/github-script@v7
        with:
          script: |
            const daysToStale = 7;
            const now = new Date();
            const prs = await github.rest.pulls.list({ owner: context.repo.owner, repo: context.repo.repo, state: 'open' });
            for (const pr of prs.data) {
              const updatedAt = new Date(pr.updated_at);
              if (Math.ceil(Math.abs(now - updatedAt) / (1000 * 60 * 60 * 24)) >= daysToStale) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number,
                  body: `⚠️ This Pull Request has been automatically closed due to inactivity for ${daysToStale} days. Reopen whenever you are ready!`
                });
                await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number, labels: ['stale'] });
                await github.rest.pulls.update({ owner: context.repo.owner, repo: context.repo.repo, pull_number: pr.number, state: 'closed' });
              }
            }

      - name: Repository Health Check
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const essentialFiles = ['README.md', 'LICENSE', 'library.properties'];
            let missingFiles = [];
            essentialFiles.forEach(file => { if (!fs.existsSync(file)) missingFiles.push(file); });
            if (missingFiles.length > 0) {
              console.log(`Health Check Alert: Missing files detected: ${missingFiles.join(', ')}`);
            }

      - name: Validate Keyword Tags
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('library.properties')) {
              const content = fs.readFileSync('library.properties', 'utf8');
              if (!content.toLowerCase().includes('sentence=') || !content.toLowerCase().includes('paragraph=')) {
                console.log("Health Check Alert: Missing description sentences or paragraphs in library.properties");
              }
            }

      - name: Lock Inactive Resolved Issues
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'closed'
            });
            const now = new Date();
            for (const issue of issues.data) {
              if (issue.pull_request) continue;
              const closedAt = new Date(issue.closed_at);
              if (Math.ceil(Math.abs(now - closedAt) / (1000 * 60 * 60 * 24)) >= 30 && !issue.locked) {
                await github.rest.issues.lock({
                  owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number,
                  lock_reason: 'resolved'
                });
              }
            }
