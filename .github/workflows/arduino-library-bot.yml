name: Arduino Library Autonomous Bot
run-name: 🤖 Autonomous Bot - ${{ github.event_name }} by @${{ github.actor }}

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  quality:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Welcome New Contributor
        if: github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🤖 Welcome @${context.actor}! Running formatting and checks now...`
            });

      - name: Run Code Formatter
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format
          find . -iname '*.h' -o -iname '*.cpp' -o -iname '*.ino' | xargs -r clang-format -i

      - name: Create Pull Request for Formatting Changes
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "style: automated code formatting by bot"
          title: "style: automated code formatting by autonomous bot"
          body: "This PR was automatically created by the Autonomous Bot to fix code formatting."
          branch: "bot/formatting-${{ github.run_id }}"
          delete-branch: true
          labels: "style, bot"
          draft: false

      - name: Auto Approve & Merge Formatting PR
        if: steps.create-pr.outputs.pull-request-operation == 'created'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.create-pr.outputs.pull-request-number }};
            if (!prNumber) return;

            // Approve the PR
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              event: 'APPROVE',
              body: '✅ Automatically approved by Autonomous Bot'
            });

            // Merge the PR
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              merge_method: 'squash'
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: '🤖 Formatting applied and merged automatically.'
            });
