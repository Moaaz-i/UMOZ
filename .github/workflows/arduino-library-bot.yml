name: Arduino Library Autonomous Bot
run-name: Deploy to ${{ inputs.deploy_target }} by @${{ github.actor }}

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  issue_comment:
    types: [created]

jobs:
  # 1. Lint & Format
  lint-and-format:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Welcome New Contributor
        if: github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🤖 Welcome @${context.actor}! I am your autonomous assistant bot. Scanning, formatting, and testing now...`
            });

      - name: Run Code Formatter (Clang Format)
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format
          find . -iname '*.h' -o -iname '*.cpp' -o -iname '*.ino' | xargs -r clang-format -i

      - name: Commit and Push Formatted Code
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: automated code formatting fixes by bot"
          commit_user_name: "autonomous-dev-bot[bot]"
          commit_user_email: "autonomous-bot@users.noreply.github.com"

  # 2. Core Build, Security & Quality Checks
  core-bot:
    if: |
      github.event_name != 'issue_comment' &&
      (always() && (needs.lint-and-format.result == 'success' || needs.lint-and-format.result == 'skipped'))
    needs: [lint-and-format]
    name: Autonomous Bot Operations
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - core: "arduino:avr"
            fqbn: "arduino:avr:uno"
          - core: "esp32:esp32"
            fqbn: "esp32:esp32:esp32"
            platform_url: "https://espressif.github.io/arduino-esp32/package_esp32_index.json"

    permissions:
      contents: write
      pull-requests: write
      issues: write
      security-events: write
      statuses: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0

      - name: Scan for Secret Leaks
        uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.pull_request.base.sha || '' }}
          head: ${{ github.event.pull_request.head.sha || '' }}
          extra_args: --only-verified

      - name: Check and Extract Version
        id: version_check
        run: |
          PROP_VERSION=$(grep -i '^version=' library.properties | cut -d= -f2 | xargs 2>/dev/null || echo "")
          JSON_VERSION=$( [ -f "library.json" ] && jq -r '.version // empty' library.json 2>/dev/null || echo "" )
          if [ -n "$PROP_VERSION" ] && [ -n "$JSON_VERSION" ] && [ "$PROP_VERSION" != "$JSON_VERSION" ]; then
            echo "❌ Version mismatch between library.properties and library.json" >&2
            exit 1
          fi
          echo "version=${PROP_VERSION:-$JSON_VERSION}" >> $GITHUB_OUTPUT

      - name: Verify Folder Structure
        run: |
          if [ ! -d "src" ] || [ ! -d "examples" ]; then
            echo "❌ Standard Arduino library structure (src/ and examples/) is required."
            exit 1
          fi

      - name: Run cppcheck
        run: |
          sudo apt-get update && sudo apt-get install -y cppcheck
          cppcheck --enable=all --suppress=missingInclude --suppress=unusedFunction src/ --inline-suppr

      - name: Check for broken markdown links
        id: link_check
        continue-on-error: true
        run: |
          sudo npm install -g markdown-link-check
          echo "### 🔗 Broken Links Report" > link_report.md
          FAILED=0
          while IFS= read -r -d '' file; do
            if ! markdown-link-check "$file" -q > output.txt 2>&1; then
              FAILED=1
              echo "#### ❌ File with dead links: $file" >> link_report.md
              cat output.txt >> link_report.md
            fi
          done < <(find . -name '*.md' -not -path './node_modules/*' -print0)
          if [ $FAILED -ne 0 ]; then
            echo "has_errors=true" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Post Broken Links Report
        if: steps.link_check.outputs.has_errors == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.existsSync('link_report.md') ? fs.readFileSync('link_report.md', 'utf8') : '';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🤖 **Autonomous Bot Link Checker:**\n\nBroken links detected. Please fix them:\n\n${report}`
            });

      - name: Install Arduino CLI & Cores
        uses: arduino/setup-arduino-cli@v2

      - name: Cache Arduino Core
        uses: actions/cache@v4
        with:
          path: ~/.arduino15/packages
          key: ${{ runner.os }}-arduino-${{ matrix.core }}

      - name: Install board platforms
        run: |
          if [ -n "${{ matrix.platform_url }}" ]; then
            arduino-cli config init --overwrite
            arduino-cli config set board_manager.additional_urls ${{ matrix.platform_url }}
          fi
          arduino-cli core update-index
          arduino-cli core install ${{ matrix.core }}

      - name: Compile examples & Profile Memory
        id: compile
        run: |
          mkdir -p error_logs
          FAILED=0
          while IFS= read -r -d '' example; do
            echo "Building $example..."
            if ! arduino-cli compile --fqbn ${{ matrix.fqbn }} "$example" --library . > compile_output.txt 2>&1; then
              FAILED=1
              echo "### ❌ Compilation Failed for $(basename "$example")" >> error_logs/errors.md
              cat compile_output.txt >> error_logs/errors.md
            else
              echo "### 📊 Memory for $(basename "$example")" >> error_logs/memory_report.md
              grep -E "Sketch uses|Global variables" compile_output.txt >> error_logs/memory_report.md || true
            fi
          done < <(find ./examples -name "*.ino" -print0)
          echo "compile_failed=$FAILED" >> $GITHUB_OUTPUT
          [ $FAILED -eq 0 ] || exit 1

      - name: Post Compilation Error Report
        if: steps.compile.outputs.compile_failed == '1' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const errors = fs.existsSync('error_logs/errors.md')
              ? fs.readFileSync('error_logs/errors.md', 'utf8')
              : 'Compilation failed for unknown reasons.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `⚠️ **Autonomous Bot - Build Failed:**\n\n${errors}\n\nPlease fix the compilation errors.`
            });

      - name: Post Memory Report (Success)
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('error_logs/memory_report.md')) {
              const report = fs.readFileSync('error_logs/memory_report.md', 'utf8');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `🤖 **Autonomous Bot Memory Report:**\n\n${report}`
              });
            }

      # ... (باقي الـ steps مثل Auto-Label, Todo Check, Size Constraint, Dependabot, Release تبقى كما هي)

      - name: Auto-Label Pull Request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({ owner: context.repo.owner, repo: context.repo.repo, pull_number: context.issue.number });
            const labels = new Set();
            files.forEach(f => {
              if (f.filename.startsWith('examples/')) labels.add('examples');
              if (f.filename.startsWith('src/')) labels.add('source-code');
              if (f.filename.endsWith('.md')) labels.add('documentation');
            });
            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
                labels: Array.from(labels)
              });
            }

      - name: Check Todo Comments
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({ owner: context.repo.owner, repo: context.repo.repo, pull_number: context.issue.number });
            let todoCount = 0;
            files.forEach(f => {
              if (f.patch && f.patch.toLowerCase().includes('todo')) todoCount++;
            });
            if (todoCount > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `📝 **Note:** Found ${todoCount} new 'TODO' comment(s) in this PR.`
              });
            }

      - name: Enforce Size Constraints
        run: |
          MAX_SIZE_KB=500
          TOTAL_SIZE=$(du -sk src/ | cut -f1)
          if [ "$TOTAL_SIZE" -gt "$MAX_SIZE_KB" ]; then
            echo "❌ Library size ($TOTAL_SIZE KB) exceeds maximum allowed $MAX_SIZE_KB KB."
            exit 1
          fi
