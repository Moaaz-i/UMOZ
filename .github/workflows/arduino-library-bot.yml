name: Arduino Library Autonomous Bot
run-name: 🤖 Autonomous Bot - ${{ github.event_name }} by @${{ github.actor }}

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # 1. Quality & Formatting
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Welcome New Contributor
        if: github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🤖 Welcome @${context.actor}! I'm your professional autonomous Arduino bot.\nRunning full quality checks now...`
            });

      - name: Code Formatting (clang-format)
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format
          find . -iname '*.h' -o -iname '*.cpp' -o -iname '*.ino' | xargs -r clang-format -i

      - name: Commit Formatted Code
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: automated formatting by autonomous bot"
          commit_user_name: "autonomous-dev-bot[bot]"
          commit_user_email: "autonomous-bot@users.noreply.github.com"

  # 2. Professional Build & Validation
  build:
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: "arduino:avr:uno"
            core: "arduino:avr"
          - board: "arduino:avr:mega"
            core: "arduino:avr"
          - board: "esp32:esp32:esp32"
            core: "esp32:esp32"
            platform_url: "https://espressif.github.io/arduino-esp32/package_esp32_index.json"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Cache Arduino Platforms
        uses: actions/cache@v4
        with:
          path: ~/.arduino15
          key: arduino-${{ matrix.core }}

      - name: Setup Platforms
        run: |
          if [ -n "${{ matrix.platform_url }}" ]; then
            arduino-cli config init --overwrite
            arduino-cli config set board_manager.additional_urls ${{ matrix.platform_url }}
          fi
          arduino-cli core update-index
          arduino-cli core install ${{ matrix.core }}

      - name: Arduino Lint (Official)
        run: arduino-cli library install "arduino-lint" && arduino-lint --compliance strict --project . --format json > lint-report.json || true

      - name: Compile All Examples
        id: compile
        run: |
          mkdir -p reports
          SUCCESS=0
          FAILED=0

          echo "# 🔨 Build Report - ${{ matrix.board }}" > reports/build.md
          echo "Generated at $(date)" >> reports/build.md
          echo "" >> reports/build.md
          echo "**Status** | **Example**" >> reports/build.md
          echo "--------|---------" >> reports/build.md

          while IFS= read -r -d '' example; do
            name=$(basename "$example")
            echo "::group::📦 Building $name"

            if arduino-cli compile --fqbn ${{ matrix.board }} "$example" --library . > compile.log 2>&1; then
              SUCCESS=$((SUCCESS+1))
              echo "✅ | $name" >> reports/build.md
              grep -E "Sketch uses|Global variables" compile.log >> reports/build.md || echo "No memory data" >> reports/build.md
            else
              FAILED=$((FAILED+1))
              echo "❌ | $name" >> reports/build.md
              echo '```' >> reports/build.md
              cat compile.log >> reports/build.md
              echo '```' >> reports/build.md
              echo "::error title=Compilation Failed::$name failed to compile"
            fi
            echo "::endgroup::"
          done < <(find ./examples -name "*.ino" -print0)

          echo "" >> reports/build.md
          echo "**Summary for ${{ matrix.board }}:** ✅ $SUCCESS Successful | ❌ $FAILED Failed" >> reports/build.md

          echo "success_count=$SUCCESS" >> $GITHUB_OUTPUT
          echo "failed_count=$FAILED" >> $GITHUB_OUTPUT

          cat reports/build.md

      - name: Upload Build Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-report-${{ matrix.board }}
          path: reports/

  # 3. Final Professional Report (يظهر كل Errors + Successes بوضوح)
  report:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Download All Reports
        uses: actions/download-artifact@v4
        with:
          pattern: build-report-*
          path: all-reports

      - name: Create Beautiful Final Summary
        run: |
          echo "# 🚀 Autonomous Bot - Complete Report" > summary.md
          echo "**Status:** ${{ needs.build.result == 'success' && '✅ PASSED' || '❌ FAILED' }}" >> summary.md
          echo "**Date:** $(date)" >> summary.md
          echo "**Actor:** @${{ github.actor }}" >> summary.md
          echo "" >> summary.md

          for file in all-reports/**/build.md; do
            if [ -f "$file" ]; then
              cat "$file" >> summary.md
              echo "\n---\n" >> summary.md
            fi
          done

      - name: Post Full Report to Pull Request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('summary.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report
            });

  # 4. Bot Commands
  commands:
    if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '/bot')
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body;
            if (body.includes('/bot-help')) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `🤖 **Autonomous Bot Commands**\n\n• \`/bot-help\` → Show this message`
              });
            }

  # 5. Daily Maintenance
  maintenance:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Close Stale Items
        uses: actions/stale@v9
        with:
          days-before-stale: 14
          days-before-close: 7
          stale-issue-message: "This issue has been automatically marked as stale."
          stale-pr-message: "This PR has been automatically marked as stale."
          exempt-draft-pr: true
