name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          source-root: src

      # Arduino libraries cannot be built with g++ or CodeQL autobuild
      - name: Skip build step (Arduino library)
        run: echo "Skipping build step for Arduino library"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
