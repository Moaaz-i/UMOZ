name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          source-root: src

      - name: Manual build for Arduino library
        run: |
          mkdir build
          g++ -c src/*.cpp -I src -o build/out.o

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
