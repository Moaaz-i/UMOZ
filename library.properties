sentence=A modular micro-RTOS for Arduino with priority scheduling, task args, micros-precision timing, WDT, ISR queuing, coroutines, signals, mutexes, PID, Kalman, software PWM, rotary encoder, and real-time CPU profiling.
paragraph=MicroTaskX v3.1 transforms Arduino into a high-efficiency micro-RTOS. Features: template-based priority scheduler with task arguments and microsecond precision, dynamic task management (add/remove/pause/resume tasks at runtime), Watchdog Timer integration, ISR event queuing, cooperative coroutines, inter-task signals and mutexes, PID control, Kalman filtering, software PWM generation, rotary encoder support, and real-time CPU usage profiling. Includes smart low-power modes (Idle Sleep for AVR, Light Sleep for ESP32), hardware utilities for fast GPIO manipulation, analog smoothing with EMA filters, button debouncing, and independent macro timers. Zero-copy architecture maximizes performance on resource-constrained microcontrollers.
